# ── Apache Hive ──
#
# Hive JDBC uses the "standalone" classifier on Maven Central, which
# produces a fat JAR with all dependencies included.
#
#   https://repo1.maven.org/maven2/org/apache/hive/hive-jdbc/{version}/
#   → hive-jdbc-{version}-standalone.jar  (with classifier)
#

[databases.hive]
name = "Apache Hive"
class_name = "org.apache.hive.jdbc.HiveDriver"
maven_group = "org.apache.hive"
maven_artifact = "hive-jdbc"
jdbc_url_template = "jdbc:hive2://{host}:{port}/{database}"
default_port = 10000
min_jre_version = "11"
version_error_signatures = [ "driver version not compatible", ]

[[databases.hive.versions]]
version = "3.1.3"
min_db_version = "3.x"
label = "hive-jdbc"
jar_sha256 = ""
maven_classifier = "standalone"

