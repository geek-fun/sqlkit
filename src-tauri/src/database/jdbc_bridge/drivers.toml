# SQLKit JDBC Driver Registry
#
# This registry defines known JDBC drivers for databases without native Rust SDKs.
# Drivers resolve LATEST from Maven Central. The TOML provides Maven coordinates,
# JDBC URL templates, error signatures, and optional legacy version caps.
#
# Embedded at compile time via include_str!() in registry.rs.
# Format: TOML v0.8+ (parsed with `toml` crate using serde).

[databases.oracle]
name = "Oracle Database"
class_name = "oracle.jdbc.OracleDriver"
maven_group = "com.oracle.database.jdbc"
maven_artifact = "ojdbc11"
jdbc_url_template = "jdbc:oracle:thin:@{host}:{port}:{database}"
jdbc_url_template_service = "jdbc:oracle:thin:@//{host}:{port}/{database}"
default_port = 1521
min_jre_version = "11"
version_cap = "21.15.0.0"
version_error_signatures = [
  "ORA-28040",
  "ORA-03134",
  "ORA-28002",
  "ORA-00439",
  "No matching authentication protocol",
  "unsupported protocol version",
  "AbstractMethodError",
]

# ── TDengine ──

[databases.tdengine]
name = "TDengine"
class_name = "com.taosdata.jdbc.TSDBDriver"
maven_group = "com.taosdata.jdbc"
maven_artifact = "taos-jdbcdriver"
jdbc_url_template = "jdbc:TAOS://{host}:{port}/{database}"
default_port = 6030
min_jre_version = "11"
version_error_signatures = [
  "driver version not compatible",
  "Authentication failed",
]

