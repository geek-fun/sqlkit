# SQLKit JDBC Driver Registry
#
# This registry defines known JDBC drivers for databases without native Rust SDKs.
# Each database type has a fallback chain of driver versions, tried in order.
# On version incompatibility, the next driver in the chain is attempted.
#
# Embedded at compile time via include_str!() in registry.rs.
# Format: TOML v0.8+ (parsed with `toml` crate using serde).

[databases.oracle]
name = "Oracle Database"
class_name = "oracle.jdbc.OracleDriver"
maven_group = "com.oracle.database.jdbc"
maven_artifact = "ojdbc11"
jdbc_url_template = "jdbc:oracle:thin:@{host}:{port}:{database}"
default_port = 1521
min_jre_version = "11"
version_error_signatures = [
  "ORA-28040",
  "ORA-03134",
  "ORA-28002",
  "ORA-00439",
  "No matching authentication protocol",
  "unsupported protocol version",
  "AbstractMethodError",
]

[[databases.oracle.versions]]
version = "21.15.0.0"
min_db_version = "19c"
label = "ojdbc11"
jar_sha256 = ""
maven_artifact_override = "ojdbc11"

[[databases.oracle.versions]]
version = "19.25.0.0"
min_db_version = "12c"
label = "ojdbc8"
jar_sha256 = ""
maven_artifact_override = "ojdbc8"

[[databases.oracle.versions]]
version = "11.2.0.4"
min_db_version = "11g"
label = "ojdbc6"
jar_sha256 = ""
maven_group_override = "com.oracle.database.jdbc"
maven_artifact_override = "ojdbc6"

