name: Node.js CI
run-name: ${{ github.event.head_commit.message }}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node-version: [24.x]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Github checkout
        uses: actions/checkout@v5
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        if: matrix.os == 'ubuntu-latest'
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - name: install frontend dependencies
        run: npm ci
      - run: npm run lint:check
      - run: npm audit --audit-level=critical
      - run: npm run test:ci
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: false

      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Download DuckDB binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: robinraju/release-downloader@v1.4
        with:
          repository: duckdb/duckdb
          tag: v1.5.3
          fileName: libduckdb-windows-amd64.zip
          out-file-path: .
      - name: Extract DuckDB binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Expand-Archive -Path ${{ github.workspace }}/libduckdb-windows-amd64.zip -DestinationPath ${{ github.workspace }}/libduckdb
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DUCKDB_LIB_DIR: ${{ github.workspace }}/libduckdb
          DUCKDB_INCLUDE_DIR: ${{ github.workspace }}/libduckdb
        with:
          includeRelease: false
          args: ${{ matrix.os == 'windows-latest' && '-- --no-default-features --features duckdb' || '' }}
